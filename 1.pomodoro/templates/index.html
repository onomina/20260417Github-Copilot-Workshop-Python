<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポモドーロタイマー</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1 tabindex="0">ポモドーロタイマー</h1>
        <div class="timer-section">
            <div class="circle">
                <span id="timer-label" aria-live="polite">作業中</span>
                <span id="timer" aria-live="polite">25:00</span>
            </div>
            <div class="button-group">
                <button id="start-btn" aria-label="タイマー開始">開始</button>
                <button id="reset-btn" aria-label="タイマーリセット">リセット</button>
            </div>
        </div>
        <div class="progress-section">
            <div>今日の進捗</div>
            <div class="progress-info">
                <span id="pomodoro-count">0</span> 完了
                <span id="focus-time">1時間40分</span> 集中時間
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/timer.js') }}"></script>
</body>
</html>
